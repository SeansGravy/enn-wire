name: air-sentinel
# EXTERNAL air watchdog — lives on the PUBLIC wire repo (free Actions
# minutes; zero dependency on private-repo billing — learned 2026-07-19 when
# billing exhaustion silently killed the private-repo sentinel).
# Original note: — runs on GitHub's infra, zero shared fate with the
# Mac or the VPS. 2026-07-19: air froze for hours while every internal watcher
# (SLO daemon, platform watchdog, AV agent) died with the plant or served
# stale verdicts. This checks the OUTCOME (public HLS pixels advancing) from
# outside and pages the publisher via an ALERT issue when the air is dark.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe air (playlist + frames)
        id: probe
        run: |
          set -u
          URL="https://air.enn247.com/air/index.m3u8"
          fail() { echo "verdict=$1" >> "$GITHUB_OUTPUT"; echo "detail=$2" >> "$GITHUB_OUTPUT"; exit 0; }
          C1=$(curl -s --max-time 15 -o /tmp/p1 -w "%{http_code}" "$URL" || echo 000)
          [ "$C1" = "200" ] || fail dark "HLS $C1 on first probe"
          sleep 25
          C2=$(curl -s --max-time 15 -o /tmp/p2 -w "%{http_code}" "$URL" || echo 000)
          [ "$C2" = "200" ] || fail dark "HLS $C2 on second probe"
          # frame-tap: pixels are the only truth
          sudo apt-get install -y -qq ffmpeg >/dev/null 2>&1 || true
          # Bounded grabs: a stalled media fetch must become a VERDICT, never a
          # hung job (a cancelled job would skip the paging step — Codex P1).
          grab() { timeout 75 ffmpeg -hide_banner -loglevel error \
                     -rw_timeout 15000000 -timeout 15000000 \
                     -i "$URL" -frames:v 1 -y "$1"; }
          grab /tmp/f1.png || fail dark "frame grab 1 failed/stalled"
          sleep 20
          grab /tmp/f2.png || fail dark "frame grab 2 failed/stalled"
          H1=$(md5sum /tmp/f1.png | cut -d" " -f1); H2=$(md5sum /tmp/f2.png | cut -d" " -f1)
          if [ "$H1" = "$H2" ]; then fail frozen "identical frames 20s apart (md5 $H1)"; fi
          echo "verdict=ok" >> "$GITHUB_OUTPUT"; echo "detail=frames advancing" >> "$GITHUB_OUTPUT"
      - name: Page on failure (ALERT issue, deduped)
        if: always() && steps.probe.outputs.verdict != 'ok' && steps.probe.outputs.verdict != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERDICT: ${{ steps.probe.outputs.verdict }}
          DETAIL: ${{ steps.probe.outputs.detail }}
        run: |
          set -u
          # Ensure the label exists (idempotent) so dedupe/close always work.
          gh label create air-sentinel --repo "$GITHUB_REPOSITORY" \
            --color FF0000 --description "External air watchdog alerts" 2>/dev/null || true
          # Dedupe by label OR title prefix (an unlabeled fallback must still
          # be found — Codex P2).
          OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --label air-sentinel --state open --json number --jq '.[0].number // empty')
          if [ -z "$OPEN" ]; then
            OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "🔥 AIR SENTINEL in:title" --json number --jq '.[0].number // empty')
          fi
          BODY="External probe verdict: **$VERDICT** — $DETAIL (run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
          if [ -n "$OPEN" ]; then
            gh issue comment "$OPEN" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "🔥 AIR SENTINEL: broadcast $VERDICT (external probe)" \
              --label air-sentinel --body "$BODY" || \
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "🔥 AIR SENTINEL: broadcast $VERDICT (external probe)" --body "$BODY"
          fi
      - name: Auto-clear on recovery
        if: steps.probe.outputs.verdict == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --label air-sentinel --state open --json number --jq '.[0].number // empty')
          if [ -z "$OPEN" ]; then
            OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "🔥 AIR SENTINEL in:title" --json number --jq '.[0].number // empty')
          fi
          if [ -n "$OPEN" ]; then
            gh issue close "$OPEN" --repo "$GITHUB_REPOSITORY" --comment "External probe: air recovered — frames advancing."
          fi
